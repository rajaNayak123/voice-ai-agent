<svg width="980" height="760" viewBox="0 0 980 760" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, Segoe UI, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5b5f6a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#c9743f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="980" height="760" fill="#14161a"/>

  <text x="40" y="40" font-size="18" font-weight="700" fill="#f0eee6">NovaVoice — Real-Time Voice AI Agent: Architecture</text>
  <text x="40" y="62" font-size="12.5" fill="#a8a79f">Browser mic → Streaming STT → RAG retrieval → Streaming LLM → Sentence-level Streaming TTS → Speaker, with barge-in at every stage</text>

  <!-- ============ CLIENT (React) ============ -->
  <rect x="40" y="90" width="900" height="150" rx="14" fill="none" stroke="#2a2e37" stroke-width="1"/>
  <text x="58" y="114" font-size="13" font-weight="600" fill="#e8915c">CLIENT — React + TypeScript (Vite)</text>

  <!-- Mic capture -->
  <rect x="58" y="130" width="150" height="64" rx="8" fill="#1b1e24" stroke="#2a2e37"/>
  <text x="133" y="156" font-size="12.5" text-anchor="middle" fill="#f0eee6" font-weight="600">Mic capture</text>
  <text x="133" y="174" font-size="10.5" text-anchor="middle" fill="#a8a79f">AudioWorklet → PCM16</text>

  <!-- WS client -->
  <rect x="240" y="130" width="150" height="64" rx="8" fill="#1b1e24" stroke="#2a2e37"/>
  <text x="315" y="156" font-size="12.5" text-anchor="middle" fill="#f0eee6" font-weight="600">WebSocket client</text>
  <text x="315" y="174" font-size="10.5" text-anchor="middle" fill="#a8a79f">Reconnect + backoff</text>

  <!-- Zustand store -->
  <rect x="422" y="130" width="150" height="64" rx="8" fill="#1b1e24" stroke="#2a2e37"/>
  <text x="497" y="156" font-size="12.5" text-anchor="middle" fill="#f0eee6" font-weight="600">Zustand store</text>
  <text x="497" y="174" font-size="10.5" text-anchor="middle" fill="#a8a79f">state, transcript, metrics</text>

  <!-- TTS playback -->
  <rect x="604" y="130" width="150" height="64" rx="8" fill="#1b1e24" stroke="#2a2e37"/>
  <text x="679" y="156" font-size="12.5" text-anchor="middle" fill="#f0eee6" font-weight="600">Audio playback queue</text>
  <text x="679" y="174" font-size="10.5" text-anchor="middle" fill="#a8a79f">Sequenced WAV per sentence</text>

  <!-- Amplitude gate -->
  <rect x="786" y="130" width="134" height="64" rx="8" fill="#1b1e24" stroke="#6b4a30"/>
  <text x="853" y="156" font-size="12.5" text-anchor="middle" fill="#e8915c" font-weight="600">Amplitude gate</text>
  <text x="853" y="174" font-size="10.5" text-anchor="middle" fill="#a8a79f">Instant barge-in trigger</text>

  <line x1="208" y1="162" x2="238" y2="162" stroke="#5b5f6a" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="390" y1="162" x2="420" y2="162" stroke="#5b5f6a" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="572" y1="162" x2="602" y2="162" stroke="#5b5f6a" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="754" y1="162" x2="784" y2="162" stroke="#5b5f6a" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- WS connection between client and server -->
  <line x1="490" y1="240" x2="490" y2="276" stroke="#e8915c" stroke-width="2"/>
  <text x="502" y="262" font-size="11" fill="#e8915c">/ws/voice (binary audio + JSON control)</text>
  <path d="M490 276 l-6 -10 h12 z" fill="#e8915c"/>
  <path d="M490 240 l-6 10 h12 z" fill="#e8915c"/>

  <!-- ============ SERVER (Node/Express) ============ -->
  <rect x="40" y="284" width="900" height="186" rx="14" fill="none" stroke="#2a2e37" stroke-width="1"/>
  <text x="58" y="308" font-size="13" font-weight="600" fill="#5cc8c2">SERVER — Node.js + Express + ws (ConversationSession orchestrator)</text>

  <!-- STT -->
  <rect x="58" y="324" width="170" height="70" rx="8" fill="#1b1e24" stroke="#2f5957"/>
  <text x="143" y="350" font-size="12.5" text-anchor="middle" fill="#5cc8c2" font-weight="600">Deepgram Streaming STT</text>
  <text x="143" y="367" font-size="10.5" text-anchor="middle" fill="#a8a79f">nova-2, language=multi</text>
  <text x="143" y="382" font-size="10.5" text-anchor="middle" fill="#a8a79f">partial + final transcripts</text>

  <!-- Language detect -->
  <rect x="258" y="324" width="150" height="70" rx="8" fill="#1b1e24" stroke="#2a2e37"/>
  <text x="333" y="350" font-size="12.5" text-anchor="middle" fill="#f0eee6" font-weight="600">Language detector</text>
  <text x="333" y="367" font-size="10.5" text-anchor="middle" fill="#a8a79f">EN / HI / Hinglish</text>
  <text x="333" y="382" font-size="10.5" text-anchor="middle" fill="#a8a79f">script + marker heuristics</text>

  <!-- RAG -->
  <rect x="438" y="324" width="190" height="70" rx="8" fill="#1b1e24" stroke="#4a4468"/>
  <text x="533" y="346" font-size="12.5" text-anchor="middle" fill="#9b8fd9" font-weight="600">RAG Retriever</text>
  <text x="533" y="363" font-size="10.5" text-anchor="middle" fill="#a8a79f">HF embeddings → Qdrant top-K</text>
  <text x="533" y="378" font-size="10.5" text-anchor="middle" fill="#a8a79f">score threshold filter</text>

  <!-- LLM -->
  <rect x="658" y="324" width="140" height="70" rx="8" fill="#1b1e24" stroke="#6b4a30"/>
  <text x="728" y="350" font-size="12.5" text-anchor="middle" fill="#e8915c" font-weight="600">Groq LLM</text>
  <text x="728" y="367" font-size="10.5" text-anchor="middle" fill="#a8a79f">Llama 3.1 8B Instant</text>
  <text x="728" y="382" font-size="10.5" text-anchor="middle" fill="#a8a79f">streamed tokens</text>

  <!-- Sentence detector -->
  <rect x="438" y="412" width="190" height="46" rx="8" fill="#1b1e24" stroke="#2a2e37"/>
  <text x="533" y="439" font-size="12" text-anchor="middle" fill="#f0eee6" font-weight="600">Sentence boundary detector</text>

  <!-- TTS -->
  <rect x="658" y="412" width="140" height="46" rx="8" fill="#1b1e24" stroke="#2f5957"/>
  <text x="728" y="439" font-size="12" text-anchor="middle" fill="#5cc8c2" font-weight="600">Deepgram Aura TTS</text>

  <line x1="228" y1="359" x2="256" y2="359" stroke="#5b5f6a" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="408" y1="359" x2="436" y2="359" stroke="#5b5f6a" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="628" y1="359" x2="656" y2="359" stroke="#5b5f6a" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="728" y1="394" x2="728" y2="410" stroke="#5b5f6a" stroke-width="1.3" marker-end="url(#arrow)"/>
  <path d="M658 435 H628" stroke="#5b5f6a" stroke-width="1.3" marker-end="url(#arrow)" fill="none"/>

  <text x="533" y="345" font-size="0" />

  <!-- AbortController note -->
  <rect x="58" y="412" width="350" height="46" rx="8" fill="none" stroke="#9b8fd9" stroke-dasharray="4 3"/>
  <text x="78" y="440" font-size="11.5" fill="#9b8fd9">Shared AbortController per turn — barge-in cancels LLM stream + TTS synthesis instantly</text>

  <!-- ============ RAG PIPELINE DETAIL ============ -->
  <rect x="40" y="494" width="430" height="120" rx="14" fill="none" stroke="#2a2e37" stroke-width="1"/>
  <text x="58" y="518" font-size="13" font-weight="600" fill="#9b8fd9">RAG PIPELINE (offline ingest + online query)</text>

  <rect x="58" y="534" width="110" height="56" rx="7" fill="#1b1e24" stroke="#2a2e37"/>
  <text x="113" y="555" font-size="11" text-anchor="middle" fill="#f0eee6">KB .txt files</text>
  <text x="113" y="571" font-size="10" text-anchor="middle" fill="#a8a79f">company/pricing/faqs</text>

  <rect x="190" y="534" width="110" height="56" rx="7" fill="#1b1e24" stroke="#2a2e37"/>
  <text x="245" y="555" font-size="11" text-anchor="middle" fill="#f0eee6">LangChain</text>
  <text x="245" y="571" font-size="10" text-anchor="middle" fill="#a8a79f">recursive chunker</text>

  <rect x="322" y="534" width="130" height="56" rx="7" fill="#1b1e24" stroke="#4a4468"/>
  <text x="387" y="555" font-size="11" text-anchor="middle" fill="#9b8fd9">Qdrant</text>
  <text x="387" y="571" font-size="10" text-anchor="middle" fill="#a8a79f">multilingual vectors</text>

  <line x1="168" y1="562" x2="188" y2="562" stroke="#5b5f6a" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="300" y1="562" x2="320" y2="562" stroke="#5b5f6a" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ============ LANGUAGE SUPPORT DETAIL ============ -->
  <rect x="500" y="494" width="440" height="120" rx="14" fill="none" stroke="#2a2e37" stroke-width="1"/>
  <text x="518" y="518" font-size="13" font-weight="600" fill="#e8915c">MULTILINGUAL GROUNDING</text>
  <text x="518" y="540" font-size="11" fill="#a8a79f">"NovaDesk ki pricing kya hai?"</text>
  <text x="518" y="558" font-size="11" fill="#a8a79f">→ embeds in shared multilingual space</text>
  <text x="518" y="576" font-size="11" fill="#a8a79f">→ retrieves same pricing.txt chunk as English query</text>
  <text x="518" y="594" font-size="11" fill="#a8a79f">→ LLM mirrors user's language/style in response</text>

  <!-- ============ STREAMING TIMELINE ============ -->
  <rect x="40" y="634" width="900" height="100" rx="14" fill="none" stroke="#2a2e37" stroke-width="1"/>
  <text x="58" y="658" font-size="13" font-weight="600" fill="#f0eee6">PERCEIVED-LATENCY TIMELINE — agent speaks before generation finishes</text>

  <line x1="70" y1="700" x2="900" y2="700" stroke="#2a2e37" stroke-width="2"/>
  <circle cx="100" cy="700" r="4" fill="#e8915c"/>
  <text x="100" y="722" font-size="10" text-anchor="middle" fill="#a8a79f">user stops talking</text>
  <circle cx="260" cy="700" r="4" fill="#9b8fd9"/>
  <text x="260" y="722" font-size="10" text-anchor="middle" fill="#a8a79f">RAG + 1st LLM token</text>
  <circle cx="420" cy="700" r="4" fill="#5cc8c2"/>
  <text x="420" y="722" font-size="10" text-anchor="middle" fill="#a8a79f">sentence 1 complete</text>
  <circle cx="500" cy="700" r="4" fill="#5cc8c2"/>
  <text x="500" y="722" font-size="10" text-anchor="middle" fill="#a8a79f">TTS audio starts</text>
  <circle cx="760" cy="700" r="4" fill="#5b5f6a"/>
  <text x="760" y="722" font-size="10" text-anchor="middle" fill="#a8a79f">LLM finishes generating</text>
  <line x1="500" y1="700" x2="900" y2="700" stroke="#5cc8c2" stroke-width="3" stroke-dasharray="2 4"/>
  <text x="700" y="690" font-size="10" fill="#5cc8c2" text-anchor="middle">agent already speaking while generation continues</text>
</svg>
